<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error | State Grants Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', 'Segoe UI', sans-serif; background-color: #f5f7fa; }
        .error-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="text-center py-5">
            <div class="mb-4">
                <i class="bi bi-gear text-danger" style="font-size: 4rem;"></i>
            </div>
            <h1 class="fw-bold mb-3" style="color: #00457C;">500 — Server Error</h1>
            <p class="text-muted fs-5 mb-4">
                Something went wrong on our end. Our team has been notified.<br>
                Please try again in a few moments.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a href="/" class="btn btn-primary">
                    <i class="bi bi-house me-1"></i>Go Home
                </a>
                <a href="/support/" class="btn btn-outline-secondary">
                    <i class="bi bi-question-circle me-1"></i>Support
                </a>
            </div>
            <p class="text-muted small mt-4">
                <i class="bi bi-bank2 me-1"></i>Beacon — State Grants Management Solution
            </p>
        </div>
    </div>
</body>
</html>
